networks:
  nginx-proxy_web:
    external: true

services:
  contract-tracker:
    build: .
    container_name: contract-tracker
    expose:
      - "5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - VIRTUAL_HOST=contracts.it4u.fun
      - LETSENCRYPT_HOST=contracts.it4u.fun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [nginx-proxy_web]
