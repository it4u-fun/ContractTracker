version: '3.8'

services:
  contract-tracker:
    build: .
    container_name: contract-tracker
    ports:
      - "5000:5000"
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Mount logs directory (optional)
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - SECRET_KEY=your-production-secret-key-change-this
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy with nginx
  nginx:
    image: nginx:alpine
    container_name: contract-tracker-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - contract-tracker
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  contract_data:
    driver: local
