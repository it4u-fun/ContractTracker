{% extends "base.html" %}

{% block title %}Contracts - Contract Tracker{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1><i class="fas fa-file-contract me-3"></i>Contracts</h1>
                <p class="text-muted">Manage all your contracts in one place</p>
            </div>
            <div>
                <a href="{{ url_for('new_contract') }}" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i>
                    New Contract
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Contracts List -->
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div id="contracts-container">
                    <!-- Contract cards will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include flash messages component -->
{% include 'components/flash_messages.html' %}
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/contracts.js') }}"></script>
{% endblock %}
